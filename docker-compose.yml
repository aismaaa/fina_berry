services:
  redis:
    image: redis:7-alpine
    container_name: n8n-redis
    # Port tidak di-expose ke host, hanya dipakai internal oleh n8n
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - n8n-network

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: n8n-app
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      # Database — pakai MySQL finaberry_db yang sudah ada (hemat RAM)
      - DB_TYPE=mysqldb
      - DB_MYSQLDB_HOST=finaberry_db
      - DB_MYSQLDB_PORT=3306
      - DB_MYSQLDB_DATABASE=${N8N_DB_DATABASE:-n8n}
      - DB_MYSQLDB_USER=${N8N_DB_USER:-finaberry_user}
      - DB_MYSQLDB_PASSWORD=${N8N_DB_PASSWORD}

      # Redis queue
      - REDIS_HOST=redis
      - REDIS_PORT=6379

      # n8n config
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://www.finnaberry.my.id/
      - GENERIC_TIMEZONE=Asia/Jakarta
      - N8N_SECURE_COOKIE=false
      - N8N_DEFAULT_LOCALE=id
      - N8N_SKIP_OWNER_SETUP=false
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - n8n-network
      - finaberry_net   # join ke network finaberry agar bisa akses finaberry_db

volumes:
  redis_data:
  n8n_data:

networks:
  n8n-network:
    driver: bridge
  finaberry_net:
    external: true   # network sudah dibuat oleh finaberry docker-compose
    name: finaberry_finaberry_net

