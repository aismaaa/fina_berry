services:
  # =============================
  # DATABASE (MySQL)
  # =============================
  db:
    image: mysql:8.0
    container_name: finaberry_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-finaberry}
      MYSQL_USER: ${DB_USERNAME:-finaberry}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - finaberry_db_data:/var/lib/mysql
    networks:
      - finaberry_net
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$DB_ROOT_PASSWORD 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # =============================
  # LARAVEL APP (nginx + php-fpm + queue via supervisord)
  # =============================
  app:
    image: ${DOCKER_IMAGE:-shabeuy/finaberry-backend}:${IMAGE_TAG:-v1.0.0}
    container_name: finaberry_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_NAME: "Warung Fina Berry"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${APP_URL:-https://www.finnaberry.my.id}
      APP_KEY: ${APP_KEY}

      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-finaberry}
      DB_USERNAME: ${DB_USERNAME:-finaberry}
      DB_PASSWORD: ${DB_PASSWORD}

      SESSION_DRIVER: database
      SESSION_LIFETIME: "120"
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      FILESYSTEM_DISK: local

      LOG_CHANNEL: stderr
      LOG_LEVEL: error

      # MAIL_MAILER: ${MAIL_MAILER:-log}
      # MAIL_HOST: ${MAIL_HOST:-}
      # MAIL_PORT: ${MAIL_PORT:-587}
      # MAIL_USERNAME: ${MAIL_USERNAME:-}
      # MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      # MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-hello@finnaberry.my.id}
      # MAIL_FROM_NAME: "Warung Fina Berry"

      MIDTRANS_MERCHANT_ID: ${MIDTRANS_MERCHANT_ID}
      MIDTRANS_CLIENT_KEY: ${MIDTRANS_CLIENT_KEY}
      MIDTRANS_SERVER_KEY: ${MIDTRANS_SERVER_KEY}
      MIDTRANS_IS_PRODUCTION: ${MIDTRANS_IS_PRODUCTION:-true}
      MIDTRANS_IS_SANITIZED: "true"
      MIDTRANS_IS_3DS: "true"
    volumes:
      - finaberry_storage:/var/www/html/storage/app
      - finaberry_logs:/var/www/html/storage/logs
    ports:
      - "${APP_PORT:-8081}:80"
    networks:
      - finaberry_net

  # =============================
  # PHPMYADMIN (opsional, hapus jika tidak perlu)
  # =============================
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: finaberry_phpmyadmin
    restart: unless-stopped
    depends_on:
      - db
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      UPLOAD_LIMIT: 50M
    ports:
      - "${PMA_PORT:-8082}:80"
    networks:
      - finaberry_net

volumes:
  finaberry_db_data:
    driver: local
  finaberry_storage:
    driver: local
  finaberry_logs:
    driver: local

networks:
  finaberry_net:
    driver: bridge
