services:
  # =============================
  # DATABASE (MySQL)
  # =============================
  db:
    image: mysql:8.0
    container_name: finaberry_db
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-finaberry}
      MYSQL_USER: ${DB_USERNAME:-finaberry}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ./mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    networks:
      - finaberry_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # =============================
  # LARAVEL APP
  # =============================
  app:
    image: ${DOCKER_IMAGE:-yourdockerhubusername/finaberry-app}:${IMAGE_TAG:-latest}
    container_name: finaberry_app
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_NAME: "Warung Fina Berry"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${APP_URL}
      APP_KEY: ${APP_KEY}

      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-finaberry}
      DB_USERNAME: ${DB_USERNAME:-finaberry}
      DB_PASSWORD: ${DB_PASSWORD}

      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database

      LOG_CHANNEL: stderr
      LOG_LEVEL: error

      MIDTRANS_MERCHANT_ID: ${MIDTRANS_MERCHANT_ID}
      MIDTRANS_CLIENT_KEY: ${MIDTRANS_CLIENT_KEY}
      MIDTRANS_SERVER_KEY: ${MIDTRANS_SERVER_KEY}
      MIDTRANS_IS_PRODUCTION: ${MIDTRANS_IS_PRODUCTION:-true}
      MIDTRANS_IS_SANITIZED: "true"
      MIDTRANS_IS_3DS: "true"
    volumes:
      - app_storage:/var/www/html/storage/app
      - app_logs:/var/www/html/storage/logs
    ports:
      - "${APP_PORT:-80}:80"
    networks:
      - finaberry_net

  # =============================
  # PHPMYADMIN (opsional, hapus jika tidak perlu)
  # =============================
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: finaberry_phpmyadmin
    restart: always
    depends_on:
      - db
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      UPLOAD_LIMIT: 50M
    ports:
      - "${PMA_PORT:-8080}:80"
    networks:
      - finaberry_net

volumes:
  db_data:
    driver: local
  app_storage:
    driver: local
  app_logs:
    driver: local

networks:
  finaberry_net:
    driver: bridge
